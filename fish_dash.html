<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>해양수산 주요 KPI 대시보드</title>
    <style>
      :root {
        --ink: #17324d;
        --muted: #627386;
        --line: #d9e2ec;
        --panel: #ffffff;
        --page: #eef4f8;
        --soft-blue: #eaf2f8;
        --amber: #a95b12;
        --amber-bg: #fff7ed;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--page);
        color: var(--ink);
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      }

      .dashboard {
        width: min(1280px, calc(100vw - 32px));
        margin: 24px auto;
        padding: 24px;
        background: #f8fbfd;
        border: 1px solid var(--line);
        box-shadow: 0 18px 38px rgba(23, 50, 77, 0.1);
      }

      .report-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 24px;
        padding: 22px 24px;
        background: var(--ink);
        color: #fff;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: #cfe0ec;
        font-size: 13px;
        font-weight: 700;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 28px;
        line-height: 1.2;
      }

      .report-meta {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
        color: #e8f0f6;
        font-size: 14px;
        text-align: right;
      }

      .report-meta span {
        padding-left: 12px;
        border-left: 1px solid rgba(255, 255, 255, 0.3);
      }

      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin: 16px 0;
      }

      .kpi-card {
        min-height: 112px;
        padding: 18px 20px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .kpi-card.alert {
        background: var(--amber-bg);
        border-color: #fed7aa;
      }

      .kpi-label {
        display: block;
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
      }

      .kpi-card strong {
        display: block;
        margin-top: 9px;
        font-size: 29px;
        line-height: 1.12;
        letter-spacing: 0;
      }

      .kpi-card small {
        display: block;
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .alert strong {
        color: var(--amber);
      }

      .content-grid {
        display: grid;
        grid-template-columns: 1.04fr 1.2fr;
        grid-template-rows: auto auto;
        gap: 12px;
      }

      .panel,
      .conclusion-panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .panel {
        padding: 16px;
      }

      .panel-heading {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 12px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 10px;
      }

      .panel-heading h2 {
        font-size: 17px;
      }

      .panel-heading span {
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      .split-panel {
        display: grid;
        grid-template-columns: minmax(290px, 0.95fr) minmax(260px, 1fr);
        gap: 14px;
        align-items: stretch;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        min-width: 420px;
        border-collapse: collapse;
        font-size: 13px;
      }

      th,
      td {
        padding: 10px 9px;
        border-bottom: 1px solid #e7edf3;
        text-align: right;
        white-space: nowrap;
      }

      th {
        background: var(--soft-blue);
        color: var(--ink);
        font-weight: 800;
      }

      th:nth-child(2),
      td:nth-child(2) {
        text-align: left;
      }

      th:first-child,
      td:first-child {
        text-align: center;
        width: 52px;
      }

      canvas {
        display: block;
        width: 100%;
        height: 260px;
      }

      .top-ports {
        grid-column: 1 / 3;
      }

      .monthly-panel canvas,
      .risk-panel canvas {
        height: 304px;
      }

      .conclusion-panel {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 10px;
        min-height: 142px;
        padding: 22px 24px;
        background: #f8fafc;
      }

      .conclusion-panel span {
        color: var(--muted);
        font-size: 14px;
        font-weight: 800;
      }

      .conclusion-panel p {
        font-size: 19px;
        font-weight: 800;
        line-height: 1.55;
      }

      @media (max-width: 980px) {
        .dashboard {
          width: min(100vw - 20px, 900px);
          padding: 14px;
          margin: 10px auto;
        }

        .report-header,
        .content-grid,
        .split-panel {
          grid-template-columns: 1fr;
        }

        .report-header {
          display: block;
        }

        .report-meta {
          justify-content: flex-start;
          margin-top: 14px;
          text-align: left;
        }

        .kpi-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .top-ports {
          grid-column: auto;
        }
      }

      @media (max-width: 560px) {
        .kpi-grid {
          grid-template-columns: 1fr;
        }

        h1 {
          font-size: 23px;
        }

        .kpi-card strong {
          font-size: 25px;
        }

        canvas {
          height: 240px;
        }
      }

      @media print {
        body {
          background: #fff;
        }

        .dashboard {
          width: 100%;
          margin: 0;
          border: 0;
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="dashboard" aria-labelledby="page-title">
      <header class="report-header">
        <div>
          <p class="eyebrow">해양수산부장관 보고</p>
          <h1 id="page-title">해양수산 주요 KPI 대시보드</h1>
        </div>
        <div class="report-meta">
          <span>분석기간 <strong id="period"></strong></span>
          <span>표본 <strong id="records"></strong>건</span>
        </div>
      </header>

      <section class="kpi-grid" aria-label="핵심 지표">
        <article class="kpi-card">
          <span class="kpi-label">총 어획량</span>
          <strong id="total-catch"></strong>
          <small>Catch volume</small>
        </article>
        <article class="kpi-card">
          <span class="kpi-label">총 수출액</span>
          <strong id="total-export"></strong>
          <small>Export value</small>
        </article>
        <article class="kpi-card">
          <span class="kpi-label">평균 만족도</span>
          <strong id="avg-satisfaction"></strong>
          <small>Public satisfaction</small>
        </article>
        <article class="kpi-card alert">
          <span class="kpi-label">총 안전사고</span>
          <strong id="total-incidents"></strong>
          <small>Safety incidents</small>
        </article>
      </section>

      <section class="content-grid">
        <article class="panel top-ports">
          <div class="panel-heading">
            <h2>항만별 위판금액 Top 5</h2>
            <span>단위: USD</span>
          </div>
          <div class="split-panel">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>순위</th>
                    <th>항만</th>
                    <th>위판금액</th>
                    <th>비중</th>
                  </tr>
                </thead>
                <tbody id="ports-table"></tbody>
              </table>
            </div>
            <canvas id="ports-chart" aria-label="항만별 위판금액 Top 5 막대 차트"></canvas>
          </div>
        </article>

        <article class="panel monthly-panel">
          <div class="panel-heading">
            <h2>월별 수출액 추이</h2>
            <span>2024-01 ~ 2025-12</span>
          </div>
          <canvas id="monthly-chart" aria-label="월별 수출액 추이 선 차트"></canvas>
        </article>

        <article class="panel risk-panel">
          <div class="panel-heading">
            <h2>기상위험도별 사고 건수 비교</h2>
            <span>단위: 건</span>
          </div>
          <canvas id="risk-chart" aria-label="기상위험도별 사고 건수 막대 차트"></canvas>
        </article>

        <article class="conclusion-panel">
          <span>결론</span>
          <p id="conclusion"></p>
        </article>
      </section>
    </main>

    <script>
      const data = {
        kpis: {
          totalCatchTons: 912.36,
          totalExportUsd: 1319524,
          avgSatisfaction: 75.55466666666666,
          totalSafetyIncidents: 141,
          periodStart: "2024-01-03",
          periodEnd: "2025-12-28",
          records: 300,
        },
        portTop5: [
          { port: "앵커리지", landingValueUsd: 501792, share: 0.1508441152421721 },
          { port: "홋카이도", landingValueUsd: 390339, share: 0.11734013515463422 },
          { port: "시애틀", landingValueUsd: 382311, share: 0.11492683132124477 },
          { port: "보스턴", landingValueUsd: 380366, share: 0.11434214323505362 },
          { port: "샌디에이고", landingValueUsd: 322047, share: 0.09681081958539753 },
        ],
        monthlyExport: [
          ["2024-01", 50952],
          ["2024-02", 43649],
          ["2024-03", 66201],
          ["2024-04", 49830],
          ["2024-05", 53460],
          ["2024-06", 50691],
          ["2024-07", 65898],
          ["2024-08", 73675],
          ["2024-09", 59014],
          ["2024-10", 50639],
          ["2024-11", 56582],
          ["2024-12", 43474],
          ["2025-01", 34910],
          ["2025-02", 47598],
          ["2025-03", 58793],
          ["2025-04", 60736],
          ["2025-05", 68591],
          ["2025-06", 75992],
          ["2025-07", 54657],
          ["2025-08", 57325],
          ["2025-09", 53006],
          ["2025-10", 60214],
          ["2025-11", 43860],
          ["2025-12", 39777],
        ],
        riskIncidents: [
          { level: "Low", incidents: 38 },
          { level: "Medium", incidents: 79 },
          { level: "High", incidents: 24 },
        ],
      };

      const formatNumber = new Intl.NumberFormat("ko-KR");
      const formatOneDecimal = new Intl.NumberFormat("ko-KR", {
        minimumFractionDigits: 1,
        maximumFractionDigits: 1,
      });
      const formatTwoDecimals = new Intl.NumberFormat("ko-KR", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      });
      const formatUsd = new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 0,
      });

      function setText(id, value) {
        document.getElementById(id).textContent = value;
      }

      function resizeCanvas(canvas) {
        const ratio = window.devicePixelRatio || 1;
        const { width, height } = canvas.getBoundingClientRect();
        canvas.width = Math.max(1, Math.floor(width * ratio));
        canvas.height = Math.max(1, Math.floor(height * ratio));
        const ctx = canvas.getContext("2d");
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        return { ctx, width, height };
      }

      function drawAxis(ctx, plot, ticks, maxValue, formatter) {
        ctx.strokeStyle = "#d8e2ea";
        ctx.lineWidth = 1;
        ctx.fillStyle = "#627386";
        ctx.font = "11px Malgun Gothic, Arial";
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";

        ticks.forEach((tick) => {
          const y = plot.bottom - (tick / maxValue) * plot.height;
          ctx.beginPath();
          ctx.moveTo(plot.left, y);
          ctx.lineTo(plot.right, y);
          ctx.stroke();
          ctx.fillText(formatter(tick), plot.left - 8, y);
        });
      }

      function niceMax(value) {
        if (value <= 0) return 1;
        const magnitude = 10 ** Math.floor(Math.log10(value));
        return Math.ceil(value / magnitude) * magnitude;
      }

      function drawBarChart(canvasId, labels, values, options = {}) {
        const canvas = document.getElementById(canvasId);
        const { ctx, width, height } = resizeCanvas(canvas);
        ctx.clearRect(0, 0, width, height);

        const plot = {
          left: options.left ?? 68,
          right: width - (options.right ?? 18),
          top: 18,
          bottom: height - (options.bottom ?? 42),
        };
        plot.width = plot.right - plot.left;
        plot.height = plot.bottom - plot.top;

        const maxValue = niceMax(Math.max(...values) * 1.08);
        const ticks = [0, maxValue / 2, maxValue];
        drawAxis(ctx, plot, ticks, maxValue, options.formatTick ?? ((v) => formatNumber.format(v)));

        const gap = 14;
        const barWidth = Math.max(18, (plot.width - gap * (values.length - 1)) / values.length);
        values.forEach((value, index) => {
          const x = plot.left + index * (barWidth + gap);
          const barHeight = (value / maxValue) * plot.height;
          const y = plot.bottom - barHeight;
          ctx.fillStyle = options.colors?.[index] ?? "#256f9f";
          ctx.fillRect(x, y, barWidth, barHeight);

          ctx.fillStyle = "#17324d";
          ctx.font = "700 11px Malgun Gothic, Arial";
          ctx.textAlign = "center";
          ctx.textBaseline = "bottom";
          ctx.fillText(options.valueLabel?.(value) ?? formatNumber.format(value), x + barWidth / 2, y - 6);

          ctx.save();
          ctx.translate(x + barWidth / 2, plot.bottom + 10);
          ctx.rotate(options.rotateLabels ? -Math.PI / 5 : 0);
          ctx.fillStyle = "#627386";
          ctx.font = "12px Malgun Gothic, Arial";
          ctx.textAlign = options.rotateLabels ? "right" : "center";
          ctx.textBaseline = "top";
          ctx.fillText(labels[index], 0, 0);
          ctx.restore();
        });
      }

      function drawLineChart(canvasId, rows) {
        const canvas = document.getElementById(canvasId);
        const { ctx, width, height } = resizeCanvas(canvas);
        ctx.clearRect(0, 0, width, height);

        const plot = {
          left: 72,
          right: width - 18,
          top: 18,
          bottom: height - 46,
        };
        plot.width = plot.right - plot.left;
        plot.height = plot.bottom - plot.top;

        const labels = rows.map((row) => row[0]);
        const values = rows.map((row) => row[1]);
        const maxValue = niceMax(Math.max(...values) * 1.05);
        drawAxis(ctx, plot, [0, maxValue / 2, maxValue], maxValue, (v) => `$${Math.round(v / 1000)}K`);

        const points = values.map((value, index) => ({
          x: plot.left + (index / (values.length - 1)) * plot.width,
          y: plot.bottom - (value / maxValue) * plot.height,
        }));

        ctx.strokeStyle = "#17806d";
        ctx.lineWidth = 3;
        ctx.beginPath();
        points.forEach((point, index) => {
          if (index === 0) ctx.moveTo(point.x, point.y);
          else ctx.lineTo(point.x, point.y);
        });
        ctx.stroke();

        ctx.fillStyle = "#17806d";
        points.forEach((point) => {
          ctx.beginPath();
          ctx.arc(point.x, point.y, 3, 0, Math.PI * 2);
          ctx.fill();
        });

        ctx.fillStyle = "#627386";
        ctx.font = "11px Malgun Gothic, Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        labels.forEach((label, index) => {
          if (index % 3 !== 0 && index !== labels.length - 1) return;
          ctx.fillText(label.slice(2), points[index].x, plot.bottom + 12);
        });

        const peakIndex = values.indexOf(Math.max(...values));
        ctx.fillStyle = "#17324d";
        ctx.font = "700 12px Malgun Gothic, Arial";
        ctx.textAlign = "center";
        ctx.fillText(
          `최고 ${labels[peakIndex]} · $${formatNumber.format(values[peakIndex])}`,
          points[peakIndex].x,
          Math.max(12, points[peakIndex].y - 22),
        );
      }

      function populateDashboard() {
        setText("period", `${data.kpis.periodStart} ~ ${data.kpis.periodEnd}`);
        setText("records", formatNumber.format(data.kpis.records));
        setText("total-catch", `${formatOneDecimal.format(data.kpis.totalCatchTons)} 톤`);
        setText("total-export", `$${formatTwoDecimals.format(data.kpis.totalExportUsd / 1_000_000)}M`);
        setText("avg-satisfaction", `${formatOneDecimal.format(data.kpis.avgSatisfaction)} 점`);
        setText("total-incidents", `${formatNumber.format(data.kpis.totalSafetyIncidents)} 건`);
        setText(
          "conclusion",
          "총 수출액은 1.32백만 달러이며, 위판금액은 앵커리지 중심으로 집중되고 고위험 기상 구간의 사고 관리가 핵심 과제입니다.",
        );

        const portsTable = document.getElementById("ports-table");
        portsTable.innerHTML = data.portTop5
          .map(
            (row, index) => `
              <tr>
                <td>${index + 1}</td>
                <td>${row.port}</td>
                <td>${formatUsd.format(row.landingValueUsd)}</td>
                <td>${formatOneDecimal.format(row.share * 100)}%</td>
              </tr>
            `,
          )
          .join("");
      }

      function renderCharts() {
        drawBarChart(
          "ports-chart",
          data.portTop5.map((row) => row.port),
          data.portTop5.map((row) => row.landingValueUsd),
          {
            left: 64,
            right: 24,
            bottom: 34,
            rotateLabels: false,
            formatTick: (v) => `$${Math.round(v / 1000)}K`,
            valueLabel: (v) => `$${Math.round(v / 1000)}K`,
            colors: ["#17324d", "#256f9f", "#17806d", "#6f8ea8", "#9bb5c9"],
          },
        );
        drawLineChart("monthly-chart", data.monthlyExport);
        drawBarChart(
          "risk-chart",
          data.riskIncidents.map((row) => row.level),
          data.riskIncidents.map((row) => row.incidents),
          {
            left: 48,
            formatTick: (v) => `${Math.round(v)}`,
            valueLabel: (v) => `${v}건`,
            colors: ["#17806d", "#256f9f", "#a95b12"],
          },
        );
      }

      populateDashboard();
      renderCharts();

      let resizeTimer;
      window.addEventListener("resize", () => {
        window.clearTimeout(resizeTimer);
        resizeTimer = window.setTimeout(renderCharts, 120);
      });
    </script>
  </body>
</html>

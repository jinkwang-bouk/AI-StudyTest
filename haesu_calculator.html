<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>해수계산기</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffffff, #e8f1ff, #fff1f1);
    }

    .calculator {
      width: 360px;
      background: #ffffff;
      padding: 24px;
      border-radius: 26px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
      border: 3px solid #0f4cbd;
    }

    h1 {
      margin: 0 0 18px;
      text-align: center;
      font-size: 28px;
      color: #111111;
      letter-spacing: -1px;
    }

    .title-red {
      color: #cd2e3a;
    }

    .title-blue {
      color: #0047a0;
    }

    .display {
      width: 100%;
      height: 72px;
      margin-bottom: 18px;
      padding: 14px;
      border: 3px solid #111111;
      border-radius: 18px;
      background: #ffffff;
      color: #111111;
      font-size: 28px;
      font-weight: bold;
      text-align: right;
      outline: none;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    button {
      height: 52px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: #f3f4f6;
      color: #111111;
      transition: 0.15s;
      box-shadow: 0 4px 0 #d1d5db;
    }

    button:hover {
      transform: translateY(-2px);
      background: #e5e7eb;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #d1d5db;
    }

    .operator {
      background: #dbeafe;
      color: #0047a0;
      box-shadow: 0 4px 0 #93c5fd;
    }

    .operator:hover {
      background: #bfdbfe;
    }

    .function {
      background: #ffe4e6;
      color: #cd2e3a;
      box-shadow: 0 4px 0 #fda4af;
    }

    .function:hover {
      background: #fecdd3;
    }

    .danger {
      background: #111111;
      color: #ffffff;
      box-shadow: 0 4px 0 #444444;
    }

    .danger:hover {
      background: #333333;
    }

    .equal {
      background: linear-gradient(135deg, #cd2e3a 0%, #cd2e3a 50%, #0047a0 50%, #0047a0 100%);
      color: white;
      grid-column: span 2;
      box-shadow: 0 4px 0 #1f2937;
    }

    .equal:hover {
      filter: brightness(1.05);
    }

    .zero {
      grid-column: span 2;
    }

    .guide {
      margin-top: 16px;
      text-align: center;
      font-size: 13px;
      color: #374151;
    }

    .taeguk-line {
      width: 80px;
      height: 6px;
      margin: 0 auto 18px;
      border-radius: 999px;
      background: linear-gradient(90deg, #cd2e3a 0%, #cd2e3a 50%, #0047a0 50%, #0047a0 100%);
    }
  </style>
</head>

<body>
  <div class="calculator">
    <h1>
      <span class="title-red">해수</span><span class="title-blue">계산기</span>
    </h1>
    <div class="taeguk-line"></div>

    <input type="text" id="display" class="display" readonly />

    <div class="buttons">
      <button class="danger" onclick="clearDisplay()">AC</button>
      <button class="danger" onclick="deleteOne()">DEL</button>
      <button class="function" onclick="appendValue('(')">(</button>
      <button class="function" onclick="appendValue(')')">)</button>
      <button class="operator" onclick="appendValue('/')">÷</button>

      <button class="function" onclick="scientific('sin')">sin</button>
      <button class="function" onclick="scientific('cos')">cos</button>
      <button class="function" onclick="scientific('tan')">tan</button>
      <button class="function" onclick="scientific('sqrt')">√</button>
      <button class="operator" onclick="appendValue('*')">×</button>

      <button class="function" onclick="scientific('log')">log</button>
      <button class="function" onclick="scientific('ln')">ln</button>
      <button class="function" onclick="appendValue('**2')">x²</button>
      <button class="function" onclick="appendValue('**')">xʸ</button>
      <button class="operator" onclick="appendValue('-')">−</button>

      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button class="function" onclick="appendValue(Math.PI.toFixed(8))">π</button>
      <button class="operator" onclick="appendValue('+')">+</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button class="function" onclick="appendValue(Math.E.toFixed(8))">e</button>
      <button class="function" onclick="scientific('factorial')">n!</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button onclick="appendValue('.')">.</button>
      <button class="equal" onclick="calculate()">=</button>

      <button class="zero" onclick="appendValue('0')">0</button>
      <button onclick="appendValue('00')">00</button>
    </div>

    <p class="guide">sin, cos, tan은 각도 단위로 계산됩니다.</p>
  </div>

  <script>
    const display = document.getElementById("display");

    function appendValue(value) {
      display.value += value;
    }

    function clearDisplay() {
      display.value = "";
    }

    function deleteOne() {
      display.value = display.value.slice(0, -1);
    }

    function calculate() {
      try {
        if (display.value.trim() === "") {
          return;
        }

        display.value = eval(display.value);
      } catch {
        display.value = "오류";
      }
    }

    function scientific(type) {
      try {
        const value = Number(display.value);

        if (display.value === "" || isNaN(value)) {
          alert("먼저 숫자를 입력해주세요.");
          return;
        }

        let result;

        switch (type) {
          case "sin":
            result = Math.sin(value * Math.PI / 180);
            break;

          case "cos":
            result = Math.cos(value * Math.PI / 180);
            break;

          case "tan":
            result = Math.tan(value * Math.PI / 180);
            break;

          case "sqrt":
            if (value < 0) {
              display.value = "오류";
              return;
            }
            result = Math.sqrt(value);
            break;

          case "log":
            if (value <= 0) {
              display.value = "오류";
              return;
            }
            result = Math.log10(value);
            break;

          case "ln":
            if (value <= 0) {
              display.value = "오류";
              return;
            }
            result = Math.log(value);
            break;

          case "factorial":
            if (value < 0 || !Number.isInteger(value)) {
              display.value = "오류";
              return;
            }
            result = factorial(value);
            break;
        }

        display.value = Number(result.toFixed(10));
      } catch {
        display.value = "오류";
      }
    }

    function factorial(num) {
      if (num === 0 || num === 1) {
        return 1;
      }

      let result = 1;

      for (let i = 2; i <= num; i++) {
        result *= i;
      }

      return result;
    }

    document.addEventListener("keydown", function(event) {
      const key = event.key;

      if (!isNaN(key) || ["+", "-", "*", "/", ".", "(", ")"].includes(key)) {
        appendValue(key);
      }

      if (key === "Enter") {
        calculate();
      }

      if (key === "Backspace") {
        deleteOne();
      }

      if (key === "Escape") {
        clearDisplay();
      }
    });
  </script>
</body>
</html>
